<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOXART</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0d0d0d;
    color:white;
    scroll-behavior:smooth;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    top:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    z-index:1000;
}

header img {
    height:40px;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero img {
    width:300px;
    border-radius:12px;
    transition:transform 0.5s;
}

.hero img.zoom {
    transform:scale(1.2);
}

h1 {
    color:gold;
    font-size:42px;
}

/* BOTÃO */
.btn {
    margin-top:20px;
    padding:15px 30px;
    background:gold;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* PRODUTOS */
.products {
    padding:100px 20px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card {
    background:#1a1a1a;
    margin:20px;
    padding:20px;
    border-radius:12px;
    width:260px;
    text-align:center;
    opacity:0;
    transform:translateY(60px);
    transition:0.6s;
}

.card.show {
    opacity:1;
    transform:translateY(0);
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
    border-radius:8px;
}

/* WHATS FLOAT */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:22px;
}

/* FOOTER */
footer {
    text-align:center;
    padding:30px;
    color:gray;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>Transforme sua foto em arte 👑</h1>
<p>Estilo premium exclusivo</p>
<img id="heroImg" src="produto.png">
<a class="btn" href="https://wa.me/5516994539880">Pedir no WhatsApp</a>
</section>

<section class="products">

<div class="card reveal">
<img src="produto.png">
<h3>Quadro Personalizado</h3>
<p>Arte estilo luxo</p>
<a class="btn" href="https://wa.me/5516994539880">Comprar</a>
</div>

<div class="card reveal">
<img src="produto.png">
<h3>Camiseta Personalizada</h3>
<p>Estampa exclusiva</p>
<a class="btn" href="https://wa.me/5516994539880">Comprar</a>
</div>

</section>

<footer>
© 2026 NOXART
</footer>

<a class="whatsapp" href="https://wa.me/5516994539880">💬</a>

<script>
// animação ao rolar
function reveal() {
    const reveals = document.querySelectorAll('.reveal');
    reveals.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
}

// efeito zoom estilo Apple
window.addEventListener("scroll", () => {
    reveal();

    const img = document.getElementById("heroImg");
    const scroll = window.scrollY;

    if (scroll > 50) {
        img.classList.add("zoom");
    } else {
        img.classList.remove("zoom");
    }
});
</script>

</body>
</html>
