<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOXART - Arte Personalizada</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

header img {
    height: 50px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(255,215,0,0.2);
    transition: transform 0.3s;
}

.hero img:hover {
    transform: scale(1.05);
}

h1 {
    color: gold;
    font-size: 40px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 30px;
    background: gold;
    color: black;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    transform: scale(1.05);
}

/* PRODUTOS */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px;
}

.card {
    background: #1a1a1a;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
    width: 260px;
    text-align: center;
    transition: 0.4s;
    opacity: 0;
    transform: translateY(40px);
}

.card img {
    width: 100%;
    border-radius: 20px;
}

/* ANIMAÇÃO AO ROLAR */
.show {
    opacity: 1;
    transform: translateY(0);
    transition: all 0.8s ease;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: gray;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>oi bora fazer 👑</h1>
<p>Quadros e camisetas personalizadas com estilo premium</p>
<img src="produto.png">
<br>
<a class="btn" href="https://wa.me/5516994539880">Pedir pelo WhatsApp</a>
</section>

<section class="products">

<div class="card reveal">
<img src="produto.png">
<h3>Quadro Personalizado</h3>
<p>Arte única no estilo luxo</p>
<a class="btn" href="https://wa.me/5516994539880">Comprar</a>
</div>

<div class="card reveal">
<img src="produto.png">
<h3>Camiseta Personalizada</h3>
<p>Estampa exclusiva</p>
<a class="btn" href="https://wa.me/5516994539880">Comprar</a>
</div>

</section>

<footer>
© 2026 NOXART - Todos os direitos reservados
</footer>

<script>
function reveal() {
    const reveals = document.querySelectorAll('.reveal');

    for (let i = 0; i < reveals.length; i++) {
        const windowHeight = window.innerHeight;
        const elementTop = reveals[i].getBoundingClientRect().top;
        const elementVisible = 100;

        if (elementTop < windowHeight - elementVisible) {
            reveals[i].classList.add("show");
        }
    }
}

window.addEventListener("scroll", reveal);
</script>

</body>
</html>
